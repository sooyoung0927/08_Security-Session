<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{thymeleaf/layout/default}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <th:block layout:fragment="css">
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                padding: 0;
                background-color: #f4f7fb;
                font-family: "Pretendard", "Noto Sans KR", sans-serif;
                color: #1f2937;
            }

            .admin-container {
                max-width: 1200px;
                margin: 40px auto;
                padding: 0 20px 40px;
            }

            .dashboard-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 28px;
                gap: 16px;
                flex-wrap: wrap;
            }

            .dashboard-title-wrap h1 {
                margin: 0;
                font-size: 30px;
                font-weight: 700;
                color: #111827;
            }

            .dashboard-title-wrap p {
                margin: 8px 0 0;
                font-size: 15px;
                color: #6b7280;
            }

            .admin-badge {
                display: inline-flex;
                align-items: center;
                padding: 10px 16px;
                border-radius: 999px;
                background-color: #111827;
                color: #ffffff;
                font-size: 14px;
                font-weight: 600;
                box-shadow: 0 8px 20px rgba(17, 24, 39, 0.15);
            }

            .summary-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }

            .summary-card {
                background: #ffffff;
                border-radius: 18px;
                padding: 24px;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
                border: 1px solid #eef2f7;
            }

            .summary-card .label {
                font-size: 14px;
                color: #6b7280;
                margin-bottom: 10px;
            }

            .summary-card .value {
                font-size: 32px;
                font-weight: 700;
                color: #111827;
                line-height: 1.2;
            }

            .summary-card .sub-text {
                margin-top: 10px;
                font-size: 13px;
                color: #9ca3af;
            }

            .panel {
                background: #ffffff;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
                border: 1px solid #eef2f7;
                overflow: hidden;
            }

            .panel-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                padding: 24px 24px 18px;
                border-bottom: 1px solid #f1f5f9;
                flex-wrap: wrap;
            }

            .panel-header h2 {
                margin: 0;
                font-size: 22px;
                font-weight: 700;
                color: #111827;
            }

            .panel-header p {
                margin: 6px 0 0;
                font-size: 14px;
                color: #6b7280;
            }

            .table-wrap {
                width: 100%;
                overflow-x: auto;
            }

            .admin-table {
                width: 100%;
                border-collapse: collapse;
                min-width: 760px;
            }

            .admin-table thead {
                background-color: #f8fafc;
            }

            .admin-table th {
                text-align: left;
                padding: 16px 20px;
                font-size: 14px;
                font-weight: 700;
                color: #374151;
                border-bottom: 1px solid #e5e7eb;
                white-space: nowrap;
            }

            .admin-table td {
                padding: 16px 20px;
                font-size: 14px;
                color: #374151;
                border-bottom: 1px solid #f1f5f9;
                vertical-align: middle;
            }

            .admin-table tbody tr:hover {
                background-color: #f9fbff;
            }

            .log-id {
                font-weight: 600;
                color: #111827;
            }

            .user-id {
                font-weight: 600;
                color: #1d4ed8;
            }

            .ip-text {
                color: #6b7280;
                font-family: monospace;
                font-size: 13px;
            }

            .status-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 64px;
                padding: 8px 12px;
                border-radius: 999px;
                font-size: 13px;
                font-weight: 700;
            }

            .status-success {
                background-color: #dcfce7;
                color: #166534;
            }

            .status-fail {
                background-color: #fee2e2;
                color: #991b1b;
            }

            .empty-box {
                padding: 60px 20px;
                text-align: center;
                color: #6b7280;
                font-size: 15px;
            }

            @media (max-width: 768px) {
                .dashboard-title-wrap h1 {
                    font-size: 24px;
                }

                .summary-card .value {
                    font-size: 26px;
                }

                .panel-header {
                    padding: 20px 18px 16px;
                }

                .admin-table th,
                .admin-table td {
                    padding: 14px 16px;
                }
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div sec:authorize="hasAnyAuthority('ADMIN')" class="admin-container">

        <!-- Security 인증 객체 -->
        <!--<span th:text="${#authentication.principal}"></span>-->

        <!-- 커스텀 사용자 로그인 객체 접근 -->
        <!--<span th:text="${#authentication.principal.loginUserDTO.userId}"></span>-->

        <div class="dashboard-header">
            <div class="dashboard-title-wrap">
                <h1>관리자 대시보드</h1>
                <p>로그인 이력과 현재 활성 사용자 현황을 확인할 수 있습니다.</p>
            </div>

            <div class="admin-badge">
                Welcome,
                <span style="margin-left: 6px;" sec:authentication="name"></span>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">현재 활성 사용자 수</div>
                <div class="value" th:text="${activeUsers}">0</div>
                <div class="sub-text">현재 세션 기준으로 집계된 접속 사용자 수</div>
            </div>

            <div class="summary-card">
                <div class="label">전체 로그인 로그 수</div>
                <div class="value" th:text="${#lists.size(logs)}">0</div>
                <div class="sub-text">시스템에 저장된 로그인 이력 건수</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div>
                    <h2>로그인 로그</h2>
                    <p>최근 로그인 성공 및 실패 이력을 확인할 수 있습니다.</p>
                </div>
            </div>

            <div class="table-wrap" th:if="${not #lists.isEmpty(logs)}">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>사용자 ID</th>
                        <th>로그인 시간</th>
                        <th>성공 여부</th>
                        <th>IP 주소</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td class="log-id" th:text="${log.id}"></td>
                        <td class="user-id" th:text="${log.userId}"></td>
                        <td th:text="${log.loginTime}"></td>
                        <td>
                            <span th:classappend="${log.success} ? 'status-badge status-success' : 'status-badge status-fail'"
                                  th:text="${log.success} ? '성공' : '실패'">
                            </span>
                        </td>
                        <td class="ip-text" th:text="${log.ipAddress}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-box" th:if="${#lists.isEmpty(logs)}">
                아직 저장된 로그인 로그가 없습니다.
            </div>
        </div>
    </div>
</div>
</body>
</html>
